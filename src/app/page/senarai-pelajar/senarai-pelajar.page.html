<ion-content>
  <app-header title="Senarai Pelajar" [showBackBtn]="true"></app-header>

  <ion-grid class="ion-padding" fixed>
    <app-header-title title="Senarai Pelajar" subtitle="Berikut senarai pelajar yang dikemaskini di dalam sistem.">
    </app-header-title>

    <ion-row class="ion-align-items-center">
      <ion-col size="12" sizeMd="6">
        <ion-text color="medium" class="body-fs italic">
          Jumlah pelajar: <span class="fw-semibold text-black">{{ total_pelajar }}</span>
        </ion-text>
      </ion-col>

      <ion-col size="12" sizeMd="6" class="ion-text-end">
        <ion-button color="tertiary" fill="outline" (click)="openStudentModal()">
          <ion-icon slot="start" name="add"></ion-icon>
          Tambah Pelajar
        </ion-button>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col>
        <app-search-bar [categoryList]="category" (onSearchEvent)="onSearch($event)"></app-search-bar>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="12" *ngIf="data.length === 0" class="ion-text-center ion-padding-top" style="height: 40vh;">
        <ion-text color="medium" class="title-fs">Tiada data pelajar ditemui</ion-text>
      </ion-col>

      <ion-col size="12" *ngFor="let item of data" class="mt-8">
        <ion-card class="card-student ion-no-margin">

          <div class="card-header">
            <div class="header-main">
              <div class="avatar-initial">{{ item.namaPelajar?.charAt(0) }}</div>
              <div class="header-text">
                <span class="student-name">{{ item.namaPelajar }}</span>
                <span class="badge-student">{{ item.noKP }}</span>
              </div>
            </div>

            <div class="header-actions">
              <ion-button fill="clear" color="primary" (click)="openStudentModal(item, true)">
                <ion-icon slot="icon-only" name="create-outline"></ion-icon>
              </ion-button>
            </div>
          </div>

          <ion-card-content>
            <div class="detail-row">
              <ion-icon name="location-outline" class="detail-icon"></ion-icon>
              <div class="detail-text">
                <span class="label">Alamat Rumah</span>
                <p class="value">{{ item.alamat }}</p>
              </div>
            </div>

            <div class="detail-row">
              <ion-icon name="business-outline" class="detail-icon"></ion-icon>
              <div class="detail-text">
                <span class="label">Kelas</span>
                <p class="value">{{ item.kelas }}</p>
              </div>
            </div>

            <div class="divider"></div>

            <ion-row>
              <ion-col size="6">
                <div class="parent-info">
                  <span class="label">Nama Bapa</span>
                  <p class="value">{{ item.namaBapa }}</p>
                </div>
              </ion-col>
              <ion-col size="6">
                <div class="parent-info">
                  <span class="label">Nama Ibu</span>
                  <p class="value">{{ item.namaIbu }}</p>
                </div>
              </ion-col>
            </ion-row>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
